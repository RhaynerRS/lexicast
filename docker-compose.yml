version: '3.8'
services:
  api:
    build:
      context: .
      dockerfile: folium-api/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - api_data:/data
    environment:
      - LLM_PROVIDER=deepseek
      # - BASE_URL=https://api.deepseek.com
      # - MODEL=deepseek-v4-flash
      # - API_KEY=sk-50a8c5e9e98f400ba2c49b2316c91652
      # - BASE_URL=       # optional override, defaults to https://api.openai.com/v1
      # - MODEL=          # optional override, defaults to gpt-4o-mini
      # To use Ollama or DeepSeek instead, set LLM_PROVIDER accordingly —
      # API_KEY/BASE_URL/MODEL are the same three vars for every provider.
      # Ollama also needs the "ollama" service below and OLLAMA_NUM_CTX:
      #   LLM_PROVIDER=ollama
      #   API_KEY=ollama
      #   BASE_URL=http://ollama:11434/v1
      #   MODEL=qwen2.5:3b-instruct-q4_K_M
      #   OLLAMA_NUM_CTX=30000
      - MAX_GROUP_TOKENS=4000
      # Reduz o numero de retries do fill_llm (default: 10). Cada retry
      # reenvia o grupo inteiro, entao isso e o maior multiplicador de custo
      # em livros com muito bloco <code>/estrutura dificil de preservar.
      - FILL_RETRY_TIMES=3
      # - FILL_RETRY_INTERVAL_SECONDS=0.75
      - TOKEN_ENCODING=cl100k_base
      - STORAGE_DIR=/data
      - JOB_WORKERS=4

      # --- CORS ---
      # Origem do frontend liberada para chamar a API do navegador. Sem isso,
      # nenhuma origem cross-origin e liberada e o browser bloqueia toda
      # chamada feita pelo folium-ui (tradução não inicia, etc). Precisa
      # bater exatamente com a origem do folium-ui.
      - FRONTEND_ORIGIN=http://localhost:3000
    labels:
      - "service_name=lexicast-api"
    restart: unless-stopped

  ollama:
    image: ollama/ollama:rocm
    container_name: ollama-amdgpu
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    devices:
      - "/dev/kfd:/dev/kfd"
      - "/dev/dri:/dev/dri"
    environment:
      - HSA_OVERRIDE_GFX_VERSION=10.3.0
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        until ollama list >/dev/null 2>&1; do sleep 1; done
        ollama pull qwen2.5:3b-instruct-q4_K_M
        wait
    restart: unless-stopped

volumes:
  ollama_data:
  api_data:
